name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-core:
    name: test (core)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: cp .env.example .env
      - run: npm run lint
      - run: npm test
      - run: npm run test:e2e
      - run: npm run build

  test-full:
    name: test (full)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nestjs_starter_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Configure env (full)
        run: |
          cat > .env <<EOF
          NODE_ENV=test
          PORT=3000
          FEATURE_PRISMA=true
          FEATURE_REDIS=true
          FEATURE_BULLMQ=true
          FEATURE_AUTH=true
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/nestjs_starter_test
          REDIS_URL=redis://localhost:6379
          JWT_ACCESS_SECRET=test-access-secret-min-32-characters
          JWT_REFRESH_SECRET=test-refresh-secret-min-32-characters
          ENCRYPTION_SECRET=test-encryption-secret-32-characters
          SWAGGER_ENABLED=false
          EOF

      - run: npx prisma migrate deploy
      - run: npm run lint
      - run: npm test
      - run: npm run test:e2e
      - run: npm run build
